name: Deploy Web

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for `git describe` fallback in vite.config.ts;
          # also ensures the tag is materialised in the local repo.
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SpaceInvadersEmulator.Web/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('SpaceInvadersEmulator.Wasm/SpaceInvadersEmulator.Wasm.csproj', 'SpaceInvadersEmulator.Core/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Install Wasm package deps
        working-directory: SpaceInvadersEmulator.Wasm/package
        run: npm ci

      - name: Install Web deps
        working-directory: SpaceInvadersEmulator.Web
        run: npm ci

      - name: Build (wasm + vite)
        working-directory: SpaceInvadersEmulator.Web
        # github.ref_name is the tag (e.g. "v0.2.0") on tag-triggered runs,
        # or the branch name on workflow_dispatch — vite.config.ts strips the
        # leading "v" and uses it for both the on-screen label and the SW
        # cacheId so each tagged release invalidates the precache.
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: SpaceInvadersEmulator.Web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
